[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "aiven-knn-bench"
version = "0.1.0"
description = "OpenSearch k-NN version comparison benchmark — Faiss vs Lucene across 2.17, 2.19, and 3.3."
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "opensearch-py>=3.1,<4",
    "numpy>=2.0,<3",
    "httpx>=0.27,<1",
]

[project.optional-dependencies]
# pip install -e '.[build]' — everything needed to build the embedding corpus locally.
# On Mac Apple Silicon this picks up MPS automatically via the default torch wheel.
build = [
    "sentence-transformers>=3.0,<4",
    "datasets>=3.0,<5",
    "pyarrow>=15",
]
# pip install -e '.[ui]' — the NiceGUI dashboard + charting libs.
ui = [
    "nicegui>=1.4",
    "plotly>=5.22,<6",
    "pandas>=2.2,<3",
]
# pip install -e '.[dev]' — everything needed for local development (corpus + UI).
dev = [
    "aiven-knn-bench[build,ui]",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
