[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "aiven-semantic-search-part-2"
version = "0.1.0"
description = "Part 2: benchmarking the limits of the Aiven for OpenSearch free tier."
requires-python = ">=3.10"
readme = "README.md"
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
