# Local ClickHouse for benchmark telemetry — mirrors the Aiven for ClickHouse
# schema used in production.  Run alongside OpenSearch for full local testing.
#
# Usage:
#   docker compose -f docker-compose.clickhouse.yml up -d
#   # Verify:
#   curl -s 'http://localhost:8123/ping'
#   curl -s 'http://localhost:8123/?query=SHOW+TABLES+FROM+bench'
#
# Credentials (local dev only):
#   User:     bench
#   Password: benchpass
#   Database: bench
#   HTTP port: 8123
#
# To connect from bench CLI, add to .env:
#   CLICKHOUSE_URL=http://localhost:8123
#   CLICKHOUSE_USER=bench
#   CLICKHOUSE_PASSWORD=benchpass
#   CLICKHOUSE_DATABASE=bench
#
# Tear down (keeps volume):
#   docker compose -f docker-compose.clickhouse.yml down
# Tear down + wipe data:
#   docker compose -f docker-compose.clickhouse.yml down -v

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse-bench
    environment:
      - CLICKHOUSE_USER=bench
      - CLICKHOUSE_PASSWORD=benchpass
      - CLICKHOUSE_DB=bench
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # 01 creates the database; 02 creates tables (alphabetic exec order).
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse-data:
